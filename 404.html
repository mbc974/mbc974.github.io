<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Page introuvable — MBC La Montagne Basket Club</title>
<link rel="icon" href="assets/icons/favicon.png">
<style>
  :root{--nuit:#0D1526;--roi:#1B519E;--orange:#D96A1B;--orange-v:#E8822A;--glacier:#BFD2E4}
  *{margin:0;padding:0;box-sizing:border-box}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;
    font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;color:#fff;text-align:center;padding:2rem;
    background:radial-gradient(120% 100% at 50% 0,#16294a,transparent 60%),linear-gradient(180deg,#0a1424,var(--nuit))}
  .box{max-width:560px}
  img{width:120px;height:auto;margin-bottom:1.5rem;filter:drop-shadow(0 10px 30px rgba(27,81,158,.5))}
  h1{font-size:clamp(4rem,18vw,7rem);line-height:1;font-weight:800;letter-spacing:-2px;
    background:linear-gradient(120deg,#fff,var(--orange-v));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  p.lead{font-size:1.4rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin:.4rem 0 .8rem}
  p.sub{color:var(--glacier);line-height:1.6;margin-bottom:2rem}
  a.btn{display:inline-block;background:linear-gradient(135deg,var(--orange),var(--orange-v));color:#190f04;
    font-weight:800;text-transform:uppercase;letter-spacing:.5px;text-decoration:none;
    padding:.9rem 2rem;border-radius:999px;box-shadow:0 12px 30px rgba(217,106,27,.4);transition:transform .2s}
  a.btn:hover{transform:translateY(-2px)}
</style>
</head>
<body>
  <div class="box">
    <img src="assets/logos/mbc-logo.png" alt="MBC La Montagne Basket Club">
    <h1>404</h1>
    <p class="lead">Balle perdue&nbsp;!</p>
    <p class="sub">Cette page n'existe pas ou a changé d'adresse.<br>Revenons sur le terrain.</p>
    <a class="btn" href="/">Retour à l'accueil</a>
  </div>
</body>
</html>
